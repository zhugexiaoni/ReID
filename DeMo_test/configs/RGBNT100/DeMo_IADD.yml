MODEL:
  TRANSFORMER_TYPE: 'ViT-B-16'
  STRIDE_SIZE: [ 16, 16 ]
  SIE_CAMERA: True
  DIRECT: 0
  # DIRECT: 1
  SIE_COE: 1.0
  ID_LOSS_WEIGHT: 0.25
  TRIPLET_LOSS_WEIGHT: 1.0
  GLOBAL_LOCAL: True
  # HDM: True
  # ATM: True
  HDM: False
  ATM: False
  HEAD: 8

  # IADD配置
  IADD:
    ENABLED: True
    WARMUP_EPOCHS: 5
    TEMPERATURE: 2.0  # Sigmoid 温度
    HARD_NEG_K: 4    # MCD 计算用的 Top-K
    LAMBDA_DISTILL: 0.3  # 蒸馏 Loss 权重
    LAMBDA_HYBRID: 0.3   # 混合 Triplet Loss 权重
    FUSION_MODE: "weak2_mcd"
    FUSION_LOG_PERIOD: 50
    MCD_GAP_THRESHOLD: 0.5

INPUT:
  SIZE_TRAIN: [ 128, 256 ]
  SIZE_TEST: [ 128, 256 ]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 16
  NUM_WORKERS: 14

DATASETS:
  NAMES: ('RGBNT100')
  ROOT_DIR: '/home/suchao/dataset/MMO_REID'

SOLVER:
  BASE_LR: 0.00035
  WARMUP_ITERS: 5
  MAX_EPOCHS: 30
  OPTIMIZER_NAME: 'Adam'
  GAMMA: 0.1
  IMS_PER_BATCH: 64
  EVAL_PERIOD: 1

TEST:
  IMS_PER_BATCH: 64
  RE_RANKING: 'no'
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'
  MISS: "nothing"

OUTPUT_DIR: 'output/IADD/RGBNT100_no_moe'
